<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thử Thách Bảng Cửu Chương - Thầy Minh Lu</title>
    <style>
        body { margin: 0; background: #87CEEB; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { background: #fff; display: block; }
        
        /* Giao diện điểm số và câu hỏi */
        .ui-top {
            position: absolute; top: 0; width: 100%; height: 60px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; box-sizing: border-box; background: rgba(255,255,255,0.8);
            font-size: 18px; font-weight: bold; z-index: 10;
        }
        #target-ques { color: #d35400; font-size: 20px; }

        /* Nút điều khiển ảo cho điện thoại */
        .controls {
            position: absolute; bottom: 20px; width: 100%;
            display: flex; justify-content: space-around; padding: 0 20px; box-sizing: border-box;
        }
        .ctrl-btn {
            width: 80px; height: 80px; background: rgba(0,0,0,0.3);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 40px; color: white; user-select: none; -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>

<div class="ui-top">
    <div>⭐ <span id="score">0</span></div>
    <div id="target-ques">Đang tải...</div>
    <div id="lives">❤️❤️❤️</div>
</div>

<canvas id="gameCanvas"></canvas>

<div class="controls">
    <div class="ctrl-btn" id="btn-left">◀️</div>
    <div class="ctrl-btn" id="btn-right">▶️</div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const livesEl = document.getElementById("lives");
    const targetEl = document.getElementById("target-ques");

    // Tự động điều chỉnh kích thước theo màn hình điện thoại
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        basket.y = canvas.height - 150; // Đẩy giỏ lên trên các nút điều khiển
    }

    let score = 0;
    let lives = 3;
    let targetResult = 0;
    let items = [];
    let basket = { x: 0, y: 0, w: 80, h: 50 };
    let moveLeft = false;
    let moveRight = false;

    window.addEventListener('resize', resize);
    
    // Điều khiển bằng nút bấm ảo (Hỗ trợ cả Touch và Mouse)
    const btnLeft = document.getElementById('btn-left');
    const btnRight = document.getElementById('btn-right');

    const startLeft = () => moveLeft = true;
    const stopLeft = () => moveLeft = false;
    const startRight = () => moveRight = true;
    const stopRight = () => moveRight = false;

    btnLeft.addEventListener('touchstart', startLeft);
    btnLeft.addEventListener('touchend', stopLeft);
    btnRight.addEventListener('touchstart', startRight);
    btnRight.addEventListener('touchend', stopRight);
    
    // Hỗ trợ cả chuột cho máy tính
    btnLeft.addEventListener('mousedown', startLeft);
    btnLeft.addEventListener('mouseup', stopLeft);
    btnRight.addEventListener('mousedown', startRight);
    btnRight.addEventListener('mouseup', stopRight);

    function nextQuestion() {
        let n1 = Math.floor(Math.random() * 8) + 2;
        let n2 = Math.floor(Math.random() * 9) + 1;
        targetResult = n1 * n2;
        targetEl.innerText = `${n1} x ${n2} = ?`;
    }

    function spawnItem() {
        let isCorrect = Math.random() > 0.7;
        let val = isCorrect ? targetResult : Math.floor(Math.random() * 80) + 2;
        items.push({
            x: Math.random() * (canvas.width - 40) + 20,
            y: -20,
            val: val,
            speed: 3 + Math.random() * 2,
            color: `hsl(${Math.random() * 360}, 70%, 50%)`
        });
    }

    function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Di chuyển giỏ
        if (moveLeft && basket.x > 0) basket.x -= 7;
        if (moveRight && basket.x < canvas.width - basket.w) basket.x += 7;

        // Vẽ giỏ
        ctx.fillStyle = "#2c3e50";
        ctx.fillRect(basket.x, basket.y, basket.w, basket.h);
        ctx.fillStyle = "white";
        ctx.font = "14px Arial";
        ctx.fillText("HỨNG", basket.x + 20, basket.y + 30);

        for (let i = 0; i < items.length; i++) {
            let item = items[i];
            item.y += item.speed;

            ctx.beginPath();
            ctx.arc(item.x, item.y, 25, 0, Math.PI * 2);
            ctx.fillStyle = item.color;
            ctx.fill();
            ctx.fillStyle = "white";
            ctx.font = "bold 18px Arial";
            ctx.textAlign = "center";
            ctx.fillText(item.val, item.x, item.y + 7);

            // Kiểm tra va chạm
            if (item.y + 25 > basket.y && item.x > basket.x && item.x < basket.x + basket.w) {
                if (item.val === targetResult) {
                    score += 10;
                    scoreEl.innerText = score;
                    nextQuestion();
                } else {
                    lives--;
                    livesEl.innerText = "❤️".repeat(lives);
                    if (lives === 0) {
                        alert("Hết mạng! Điểm của em: " + score);
                        location.reload();
                    }
                }
                items.splice(i, 1);
                i--;
            } else if (item.y > canvas.height) {
                items.splice(i, 1);
                i--;
            }
        }
    }

    resize();
    nextQuestion();
    setInterval(spawnItem, 2000);
    
    function loop() {
        update();
        requestAnimationFrame(loop);
    }
    loop();
</script>
</body>
</html>
